<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Узнай свой тип личности</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    height:100%;
    background: #080B18;
    color: #F0E8D8;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow-x:hidden;
    -webkit-tap-highlight-color: transparent;
  }
  #space-canvas{
    position:fixed; top:0; left:0; width:100%; height:100%;
    pointer-events:none; z-index:0;
  }
  #app{
    position:relative; z-index:1;
    min-height:100vh;
    display:flex; flex-direction:column;
    padding: 28px 20px 44px;
  }
  .screen{
    display:none; flex:1; flex-direction:column;
    animation: fadeIn .5s ease;
  }
  .screen.active{ display:flex; }
  @keyframes fadeIn{ from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }

  .eyebrow{
    font-size:11px; letter-spacing:.18em; text-transform:uppercase;
    color:#C9A84C; margin-bottom:12px; opacity:.9;
  }
  h1{
    font-size:27px; line-height:1.25; margin:0 0 14px;
    font-weight:700; color:#F0E8D8;
    text-shadow: 0 0 30px rgba(201,168,76,0.3);
  }
  p.lead{
    color:#B8A898; font-size:15px; line-height:1.6; margin:0 0 30px;
  }
  .spacer{ flex:1; }

  .card{
    background: rgba(10,15,35,0.7);
    border: 1px solid rgba(201,168,76,0.22);
    border-radius: 20px;
    padding: 20px;
    backdrop-filter: blur(12px);
    box-shadow: 0 4px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(201,168,76,0.1);
  }

  label{
    display:block; font-size:12px; color:#9A8E7A; margin:16px 0 7px;
    letter-spacing:.05em; text-transform:uppercase;
  }
  label:first-child{ margin-top:0; }
  input[type=text], select{
    width:100%; padding:13px 14px; border-radius:12px;
    border: 1px solid rgba(201,168,76,0.28);
    background: rgba(255,255,255,0.04);
    color:#F0E8D8; font-size:16px; outline:none;
  }
  input[type=text]:focus, select:focus{ border-color:#C9A84C; }
  select option{ background:#0D1225; }
  .date-row{ display:flex; gap:10px; }
  .date-row select{ flex:1; }

  .btn{
    display:inline-flex; align-items:center; justify-content:center;
    width:100%; padding:16px 18px; margin-top:24px;
    border:none; border-radius:999px;
    background: linear-gradient(135deg, #E8C96A, #C9A84C, #A8823A);
    color:#0A0A14; font-size:16px; font-weight:700;
    cursor:pointer; transition:transform .15s, box-shadow .15s;
    box-shadow: 0 4px 20px rgba(201,168,76,0.35);
  }
  .btn:active{ transform:scale(0.97); }
  .btn:disabled{ opacity:.4; }
  .btn.secondary{
    background:transparent; color:#C9A84C;
    border:1px solid rgba(201,168,76,0.45);
    box-shadow:none;
  }

  .progress{ display:flex; gap:6px; margin-bottom:24px; }
  .progress .dot{
    flex:1; height:3px; border-radius:2px;
    background:rgba(201,168,76,0.15);
  }
  .progress .dot.done{ background:#C9A84C; box-shadow:0 0 6px rgba(201,168,76,0.5); }

  .q-title{ font-size:19px; font-weight:600; margin:4px 0 22px; line-height:1.4; }
  .option{
    display:block; width:100%; text-align:left;
    padding:15px 17px; margin-bottom:12px;
    border-radius:15px; border:1px solid rgba(201,168,76,0.18);
    background:rgba(255,255,255,0.03);
    color:#E8DDD0; font-size:15px; line-height:1.45;
    cursor:pointer; transition:all .2s ease;
  }
  .option:active, .option:hover{
    background:rgba(201,168,76,0.1);
    border-color:rgba(201,168,76,0.5);
    transform:translateX(3px);
  }

  .result-emoji{ font-size:60px; text-align:center; margin:8px 0 8px; }
  .result-name{
    text-align:center; font-size:25px; font-weight:800;
    color:#E8C96A; margin:0 0 20px;
    text-shadow:0 0 20px rgba(201,168,76,0.5);
  }
  .result-desc{
    font-size:15.5px; line-height:1.7; color:#E0D8CC;
  }
  .footnote{
    text-align:center; color:#7A7060; font-size:12px; margin-top:16px;
  }
  .error-box{
    text-align:center; color:#7A7060; padding:40px 10px;
  }
</style>
</head>
<body>
<canvas id="space-canvas"></canvas>
<div id="app">

  <section class="screen active" id="screen-welcome">
    <div class="spacer"></div>
    <div class="eyebrow">Астрология · Евгения Дубровина</div>
    <h1>Узнай свой тип личности</h1>
    <p class="lead">Короткий квиз на 5 вопросов расскажет, какой архетип управляет вашими решениями, отношениями и энергией — и что с этим делать.</p>
    <button class="btn" onclick="goTo('screen-form')">Пройти квиз ✨</button>
    <div class="spacer"></div>
  </section>

  <section class="screen" id="screen-form">
    <div class="eyebrow">Шаг 1 из 2</div>
    <h1>Расскажите о себе</h1>
    <div class="card">
      <label for="in-name">Ваше имя</label>
      <input type="text" id="in-name" placeholder="Как вас зовут">
      <label>Дата рождения</label>
      <div class="date-row">
        <select id="in-day"></select>
        <select id="in-month"></select>
        <select id="in-year"></select>
      </div>
    </div>
    <button class="btn" onclick="startQuiz()">Далее →</button>
  </section>

  <section class="screen" id="screen-quiz">
    <div class="eyebrow">Шаг 2 из 2</div>
    <div class="progress" id="progress"></div>
    <div class="q-title" id="q-title"></div>
    <div id="q-options"></div>
  </section>

  <section class="screen" id="screen-result">
    <div class="spacer"></div>
    <div class="result-emoji" id="res-emoji"></div>
    <div class="result-name" id="res-name"></div>
    <div class="card">
      <div class="result-desc" id="res-desc"></div>
    </div>
    <button class="btn" id="btn-book">Записаться на консультацию к Евгении</button>
    <button class="btn secondary" style="margin-top:12px;" onclick="restart()">Пройти ещё раз</button>
    <div class="spacer"></div>
  </section>

  <section class="screen" id="screen-error">
    <div class="spacer"></div>
    <div class="error-box">
      <div style="font-size:40px;margin-bottom:12px;">✦</div>
      <div>Не удалось загрузить данные.<br>Попробуйте открыть приложение ещё раз.</div>
    </div>
    <div class="spacer"></div>
  </section>

</div>
<script>
// ===== Telegram =====
const tg = window.Telegram ? window.Telegram.WebApp : null;
if(tg){ tg.ready(); tg.expand(); }
const tgUser = tg && tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user : null;

// ===== SPACE CANVAS =====
const canvas = document.getElementById('space-canvas');
const ctx = canvas.getContext('2d');
function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// Stars
const STARS = Array.from({length:120}, () => ({
  x: Math.random(), y: Math.random(),
  r: Math.random()*1.5+0.2,
  a: Math.random()*Math.PI*2,
  speed: Math.random()*0.012+0.003,
  gold: Math.random() > 0.6
}));

// Constellations (normalized 0-1 coords)
const CONSTELLATIONS = [
  [[0.15,0.12],[0.25,0.18],[0.35,0.14],[0.3,0.25],[0.2,0.28]],
  [[0.6,0.08],[0.72,0.14],[0.8,0.1],[0.75,0.22],[0.65,0.2],[0.6,0.08]],
  [[0.1,0.55],[0.22,0.5],[0.3,0.58],[0.25,0.68],[0.12,0.65],[0.1,0.55]],
  [[0.65,0.7],[0.78,0.65],[0.85,0.72],[0.8,0.82],[0.68,0.8]],
];

// Planets data (x, y in 0-1, radius, color, hasRing, ringColor)
const PLANETS = [
  {x:0.82, y:0.08, r:28, color:'#D4934A', hasRing:true, ringColor:'rgba(212,147,74,0.5)', tilt:0.3},
  {x:0.08, y:0.35, r:20, color:'#8BA8C8', hasRing:true, ringColor:'rgba(139,168,200,0.45)', tilt:-0.25},
  {x:0.75, y:0.5, r:16, color:'#C87D3A', hasRing:false},
  {x:0.15, y:0.8, r:22, color:'#A89060', hasRing:true, ringColor:'rgba(168,144,96,0.4)', tilt:0.2},
];

function drawPlanet(p){
  const x = p.x * canvas.width;
  const y = p.y * canvas.height;
  const r = p.r;
  // Ring behind
  if(p.hasRing){
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(p.tilt||0);
    ctx.scale(1, 0.35);
    ctx.beginPath();
    ctx.arc(0,0,r*1.9,0,Math.PI*2);
    ctx.strokeStyle = p.ringColor;
    ctx.lineWidth = r*0.55;
    ctx.stroke();
    ctx.restore();
  }
  // Planet body
  const grad = ctx.createRadialGradient(x-r*0.3, y-r*0.3, r*0.1, x, y, r);
  grad.addColorStop(0, lighten(p.color, 40));
  grad.addColorStop(1, darken(p.color, 30));
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fillStyle = grad;
  ctx.fill();
  // Stripe texture
  ctx.save();
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.clip();
  for(let i=-r; i<r; i+=r*0.28){
    ctx.beginPath();
    ctx.moveTo(x-r, y+i);
    ctx.lineTo(x+r, y+i);
    ctx.strokeStyle = 'rgba(0,0,0,0.12)';
    ctx.lineWidth = r*0.18;
    ctx.stroke();
  }
  ctx.restore();
}

function lighten(hex, pct){
  const n=parseInt(hex.slice(1),16);
  const r=Math.min(255,(n>>16)+pct), g=Math.min(255,((n>>8)&0xff)+pct), b=Math.min(255,(n&0xff)+pct);
  return `rgb(${r},${g},${b})`;
}
function darken(hex, pct){
  const n=parseInt(hex.slice(1),16);
  const r=Math.max(0,(n>>16)-pct), g=Math.max(0,((n>>8)&0xff)-pct), b=Math.max(0,(n&0xff)-pct);
  return `rgb(${r},${g},${b})`;
}

function drawStar6(x,y,r,alpha){
  ctx.save();
  ctx.translate(x,y);
  ctx.beginPath();
  for(let i=0;i<6;i++){
    const a=i*Math.PI/3-Math.PI/6;
    const a2=a+Math.PI/6;
    ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    ctx.lineTo(Math.cos(a2)*r*0.45, Math.sin(a2)*r*0.45);
  }
  ctx.closePath();
  ctx.fillStyle=`rgba(201,168,76,${alpha})`;
  ctx.fill();
  ctx.restore();
}

let frame=0;
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Nebula blobs
  const blobs=[
    {x:0.2,y:0.2,r:180,c:'rgba(30,20,80,0.25)'},
    {x:0.8,y:0.6,r:220,c:'rgba(20,40,70,0.2)'},
    {x:0.5,y:0.9,r:160,c:'rgba(50,15,60,0.18)'},
  ];
  for(const b of blobs){
    const g=ctx.createRadialGradient(b.x*canvas.width,b.y*canvas.height,0,b.x*canvas.width,b.y*canvas.height,b.r);
    g.addColorStop(0,b.c); g.addColorStop(1,'transparent');
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.arc(b.x*canvas.width,b.y*canvas.height,b.r,0,Math.PI*2);
    ctx.fill();
  }

  // Planets
  for(const p of PLANETS) drawPlanet(p);

  // Constellations
  for(const pts of CONSTELLATIONS){
    ctx.beginPath();
    pts.forEach((p,i)=>{
      const x=p[0]*canvas.width, y=p[1]*canvas.height;
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.strokeStyle='rgba(201,168,76,0.35)';
    ctx.lineWidth=0.8;
    ctx.stroke();
    for(const p of pts){
      const x=p[0]*canvas.width, y=p[1]*canvas.height;
      ctx.beginPath();
      ctx.arc(x,y,2.5,0,Math.PI*2);
      ctx.fillStyle='rgba(201,168,76,0.7)';
      ctx.fill();
    }
  }

  // Stars
  for(const s of STARS){
    s.a+=s.speed;
    const tw=(Math.sin(s.a)+1)/2;
    const x=s.x*canvas.width, y=s.y*canvas.height;
    if(s.r>1.1 && s.gold){
      drawStar6(x,y,s.r*1.8,0.2+tw*0.6);
    } else {
      ctx.beginPath();
      ctx.arc(x,y,s.r,0,Math.PI*2);
      ctx.fillStyle=s.gold ? `rgba(230,200,110,${0.3+tw*0.6})` : `rgba(200,210,240,${0.15+tw*0.5})`;
      ctx.fill();
    }
  }

  // Big accent stars
  const accentStars=[{x:0.45,y:0.3},{x:0.55,y:0.65},{x:0.2,y:0.45}];
  for(const s of accentStars){
    const pulse=(Math.sin(frame*0.02)+1)/2;
    drawStar6(s.x*canvas.width,s.y*canvas.height,4+pulse*2,0.4+pulse*0.4);
  }

  frame++;
  requestAnimationFrame(draw);
}
draw();

// ===== Navigation =====
function goTo(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== Date selects =====
const daySel=document.getElementById('in-day');
const monthSel=document.getElementById('in-month');
const yearSel=document.getElementById('in-year');
for(let d=1;d<=31;d++) daySel.innerHTML+=`<option>${d}</option>`;
['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь']
  .forEach((m,i)=>monthSel.innerHTML+=`<option value="${i+1}">${m}</option>`);
const yr=new Date().getFullYear();
for(let y=yr;y>=yr-90;y--) yearSel.innerHTML+=`<option>${y}</option>`;

// ===== Quiz =====
const QUESTIONS=[
  {title:"Когда вы принимаете важное решение, вы чаще всего:",
   options:["Доверяете интуиции и внутреннему ощущению","Анализируете факты и взвешиваете все «за» и «против»","Советуетесь с близкими и ориентируетесь на их мнение"],
   scores:[1,2,3]},
  {title:"Что лучше всего описывает вашу энергию?",
   options:["Я генерирую идеи и вдохновляю других","Я довожу дела до конца и люблю порядок","Я создаю гармонию и забочусь о людях вокруг"],
   scores:[4,2,3]},
  {title:"В отношениях вы:",
   options:["Ищете глубокую духовную связь","Цените стабильность и надёжность","Хотите свободы и пространства для роста"],
   scores:[1,2,4]},
  {title:"Что вас восстанавливает после сложного дня?",
   options:["Тишина и одиночество","Общение с близкими","Творчество или движение"],
   scores:[1,3,4]},
  {title:"Ваша главная сила — это:",
   options:["Чувствовать людей и ситуации","Видеть суть и находить решения","Создавать красоту и смыслы"],
   scores:[1,2,4]},
];

let currentQ=0, answers=[], quizData=null;

function startQuiz(){
  if(!document.getElementById('in-name').value.trim()){
    document.getElementById('in-name').focus(); return;
  }
  currentQ=0; answers=[];
  goTo('screen-quiz');
  renderQ();
}

function renderQ(){
  const q=QUESTIONS[currentQ];
  document.getElementById('q-title').textContent=q.title;
  const pw=document.getElementById('progress');
  pw.innerHTML='';
  QUESTIONS.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i<currentQ?' done':'');
    pw.appendChild(d);
  });
  const ow=document.getElementById('q-options');
  ow.innerHTML='';
  q.options.forEach((opt,i)=>{
    const b=document.createElement('button');
    b.className='option'; b.textContent=opt;
    b.onclick=()=>selectAns(i);
    ow.appendChild(b);
  });
}

function selectAns(i){
  answers.push(QUESTIONS[currentQ].scores[i]);
  currentQ++;
  if(currentQ<QUESTIONS.length) renderQ();
  else showResult();
}

function computeType(){
  const t={1:0,2:0,3:0,4:0};
  answers.forEach(id=>t[id]++);
  let best=1, bestS=-1;
  [1,2,3,4].forEach(id=>{ if(t[id]>bestS){bestS=t[id];best=id;} });
  return best;
}

function showResult(){
  if(!quizData){ goTo('screen-error'); return; }
  const typeId=computeType();
  const type=quizData.types.find(t=>t.id===typeId)||quizData.types[0];
  document.getElementById('res-emoji').textContent=type.emoji;
  document.getElementById('res-name').textContent=type.name;
  document.getElementById('res-desc').textContent=type.description;
  goTo('screen-result');
  const payload={
    name:document.getElementById('in-name').value.trim(),
    birthDate:`${daySel.value}.${monthSel.value}.${yearSel.value}`,
    telegramId:tgUser?tgUser.id:null,
    telegramUsername:tgUser?tgUser.username:null,
    resultTypeId:typeId
  };
  if(tg&&tg.sendData){ try{tg.sendData(JSON.stringify(payload));}catch(e){} }
}

function restart(){ goTo('screen-welcome'); }

document.getElementById('btn-book').addEventListener('click',()=>{
  const url='https://t.me/EvgeniyaDubrovina';
  if(tg&&tg.openLink){ tg.openLink(url); }
  else{ window.open(url,'_blank'); }
});

fetch('data.json?v='+Date.now())
  .then(r=>{ if(!r.ok)throw new Error(); return r.json(); })
  .then(d=>{ quizData=d; })
  .catch(()=>{ quizData=null; });
</script>
</body>
</html>
