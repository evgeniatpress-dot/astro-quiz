<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Узнай свой тип личности</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  min-height:100%; background:#0A0A0A;
  color:#E8DDD0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  overflow-x:hidden; -webkit-tap-highlight-color:transparent;
}
#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
#app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;padding:32px 22px 48px;}
.screen{display:none;flex:1;flex-direction:column;animation:fadeIn .5s ease;}
.screen.active{display:flex;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* Decor top */
.moon-header{
  display:flex; justify-content:center; align-items:center; gap:18px;
  margin-bottom:24px; opacity:.85;
}
.moon{width:44px;height:44px;border-radius:50%;position:relative;overflow:hidden;flex-shrink:0;}
.moon-full{background:radial-gradient(circle at 40% 40%, #D8D0C0, #7A7468);}
.moon-crescent{background:#0A0A0A;}
.moon-crescent::after{
  content:'';position:absolute;top:-4px;left:-6px;
  width:44px;height:44px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%, #C8C0B0, #6A6560);
  transform:translateX(12px);
}
.moon-shadow{background:radial-gradient(circle at 45% 35%, #5A5550, #222);}
.moon-divider{width:1px;height:30px;background:linear-gradient(to bottom,transparent,rgba(201,168,76,0.4),transparent);}

/* Cross stars */
.cross{display:inline-block;color:#C9A84C;font-size:14px;opacity:.7;}
.cross-lg{font-size:20px;opacity:.85;}

.eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#3EC89A;margin-bottom:10px;}
h1{font-size:26px;line-height:1.25;margin:0 0 12px;font-weight:700;color:#E8DDD0;text-shadow:0 0 20px rgba(62,200,154,0.2);}
p.lead{color:#8A8070;font-size:15px;line-height:1.6;margin:0 0 28px;}
.spacer{flex:1;}

.card{
  background:rgba(10,12,10,0.75);
  border:1px solid rgba(62,200,154,0.2);
  border-radius:20px; padding:20px;
  backdrop-filter:blur(10px);
  box-shadow:0 4px 24px rgba(0,0,0,0.5),inset 0 1px 0 rgba(62,200,154,0.08);
}

label{display:block;font-size:11px;color:#6A7060;margin:16px 0 7px;letter-spacing:.08em;text-transform:uppercase;}
label:first-child{margin-top:0;}
input[type=text],select{
  width:100%;padding:13px 14px;border-radius:12px;
  border:1px solid rgba(62,200,154,0.25);
  background:rgba(255,255,255,0.03);
  color:#E8DDD0;font-size:16px;outline:none;
}
input[type=text]:focus,select:focus{border-color:#3EC89A;}
select option{background:#0D120D;}
.date-row{display:flex;gap:10px;}
.date-row select{flex:1;}

.btn{
  display:inline-flex;align-items:center;justify-content:center;
  width:100%;padding:16px 18px;margin-top:24px;
  border:none;border-radius:999px;
  background:linear-gradient(135deg,#5EDDB2,#2EAA7A);
  color:#080C08;font-size:16px;font-weight:700;
  cursor:pointer;transition:transform .15s,box-shadow .15s;
  box-shadow:0 4px 20px rgba(62,200,154,0.3);
}
.btn:active{transform:scale(.97);}
.btn.secondary{background:transparent;color:#3EC89A;border:1px solid rgba(62,200,154,0.4);box-shadow:none;margin-top:12px;}

.progress{display:flex;gap:6px;margin-bottom:24px;}
.progress .dot{flex:1;height:3px;border-radius:2px;background:rgba(62,200,154,0.12);}
.progress .dot.done{background:#3EC89A;box-shadow:0 0 6px rgba(62,200,154,0.5);}

.q-title{font-size:19px;font-weight:600;margin:4px 0 22px;line-height:1.4;}
.option{
  display:block;width:100%;text-align:left;
  padding:15px 17px;margin-bottom:11px;
  border-radius:15px;border:1px solid rgba(62,200,154,0.15);
  background:rgba(255,255,255,0.025);
  color:#D8D0C0;font-size:15px;line-height:1.45;
  cursor:pointer;transition:all .2s;
}
.option:active,.option:hover{background:rgba(62,200,154,0.08);border-color:rgba(62,200,154,0.4);transform:translateX(3px);}

.result-emoji{font-size:58px;text-align:center;margin:8px 0 8px;}
.result-name{text-align:center;font-size:24px;font-weight:800;color:#5EDDB2;margin:0 0 20px;text-shadow:0 0 18px rgba(62,200,154,0.45);}
.result-desc{font-size:15.5px;line-height:1.7;color:#D8D0C0;}

/* Botanical SVG decor */
.botanical{position:fixed;pointer-events:none;opacity:.18;z-index:0;}
.botanical-left{left:-10px;top:30%;}
.botanical-right{right:-10px;top:50%;transform:scaleX(-1);}
</style>
</head>
<body>

<!-- Botanical decorations -->
<svg class="botanical botanical-left" width="80" height="200" viewBox="0 0 80 200">
  <g fill="none" stroke="#3A5A3A" stroke-width="1.5">
    <path d="M40 200 Q35 150 30 120 Q20 90 10 70"/>
    <path d="M30 120 Q15 110 5 95"/>
    <path d="M35 140 Q18 130 8 118"/>
    <ellipse cx="10" cy="68" rx="12" ry="7" fill="#2A4A2A" stroke="none" transform="rotate(-30 10 68)"/>
    <ellipse cx="5" cy="93" rx="11" ry="6" fill="#2A4A2A" stroke="none" transform="rotate(-20 5 93)"/>
    <ellipse cx="8" cy="116" rx="13" ry="7" fill="#2A4A2A" stroke="none" transform="rotate(-25 8 116)"/>
    <ellipse cx="28" cy="118" rx="10" ry="5" fill="#3A5A2A" stroke="none" transform="rotate(15 28 118)"/>
  </g>
</svg>
<svg class="botanical botanical-right" width="80" height="200" viewBox="0 0 80 200">
  <g fill="none" stroke="#3A5A3A" stroke-width="1.5">
    <path d="M40 200 Q35 150 30 120 Q20 90 10 70"/>
    <path d="M30 120 Q15 110 5 95"/>
    <path d="M35 140 Q18 130 8 118"/>
    <ellipse cx="10" cy="68" rx="12" ry="7" fill="#2A4A2A" stroke="none" transform="rotate(-30 10 68)"/>
    <ellipse cx="5" cy="93" rx="11" ry="6" fill="#2A4A2A" stroke="none" transform="rotate(-20 5 93)"/>
    <ellipse cx="8" cy="116" rx="13" ry="7" fill="#2A4A2A" stroke="none" transform="rotate(-25 8 116)"/>
    <ellipse cx="28" cy="118" rx="10" ry="5" fill="#3A5A2A" stroke="none" transform="rotate(15 28 118)"/>
  </g>
</svg>

<canvas id="bg-canvas"></canvas>
<div id="app">

  <section class="screen active" id="screen-welcome">
    <div class="spacer"></div>
    <!-- Moon phases header -->
    <div class="moon-header">
      <span class="cross">✦</span>
      <div class="moon moon-crescent"></div>
      <div class="moon-divider"></div>
      <div class="moon moon-full"></div>
      <div class="moon-divider"></div>
      <div class="moon moon-shadow"></div>
      <span class="cross">✦</span>
    </div>
    <div class="eyebrow">Астрология · Евгения Дубровина</div>
    <h1>Узнай свой тип личности</h1>
    <p class="lead">Короткий квиз на 5 вопросов расскажет, какой архетип управляет вашими решениями, отношениями и энергией.</p>
    <button class="btn" onclick="goTo('screen-form')">Пройти квиз ✦</button>
    <div class="spacer"></div>
  </section>

  <section class="screen" id="screen-form">
    <div class="moon-header" style="margin-bottom:16px;">
      <span class="cross">+</span>
      <div class="moon moon-full" style="width:28px;height:28px;"></div>
      <span class="cross">+</span>
    </div>
    <div class="eyebrow">Шаг 1 из 2</div>
    <h1>Расскажите о себе</h1>
    <div class="card">
      <label for="in-name">Ваше имя</label>
      <input type="text" id="in-name" placeholder="Как вас зовут">
      <label>Дата рождения</label>
      <div class="date-row">
        <select id="in-day"></select>
        <select id="in-month"></select>
        <select id="in-year"></select>
      </div>
    </div>
    <button class="btn" onclick="startQuiz()">Далее →</button>
  </section>

  <section class="screen" id="screen-quiz">
    <div class="eyebrow">Шаг 2 из 2</div>
    <div class="progress" id="progress"></div>
    <div class="q-title" id="q-title"></div>
    <div id="q-options"></div>
  </section>

  <section class="screen" id="screen-result">
    <div class="spacer"></div>
    <div class="moon-header"><span class="cross-lg">✦</span></div>
    <div class="result-emoji" id="res-emoji"></div>
    <div class="result-name" id="res-name"></div>
    <div class="card">
      <div class="result-desc" id="res-desc"></div>
    </div>
    <button class="btn" id="btn-book">Задать мне вопрос</button>
    <button class="btn secondary" onclick="restart()">Пройти ещё раз</button>
    <div class="spacer"></div>
  </section>

  <section class="screen" id="screen-error">
    <div class="spacer"></div>
    <div style="text-align:center;color:#6A7060;padding:40px 10px;">
      <div style="font-size:40px;margin-bottom:12px;">✦</div>
      <div>Не удалось загрузить данные.<br>Попробуйте открыть приложение ещё раз.</div>
    </div>
    <div class="spacer"></div>
  </section>

</div>
<script>
const tg=window.Telegram?window.Telegram.WebApp:null;
if(tg){tg.ready();tg.expand();}
const tgUser=tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user?tg.initDataUnsafe.user:null;

// BG canvas — stars + cross sparkles
const cv=document.getElementById('bg-canvas');
const cx=cv.getContext('2d');
function rsz(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
rsz();window.addEventListener('resize',rsz);

const ST=Array.from({length:80},()=>({
  x:Math.random(),y:Math.random(),
  r:Math.random()*1.2+0.2,
  a:Math.random()*Math.PI*2,sp:Math.random()*.01+.003,
  gold:Math.random()>.5
}));
const CROSS_ST=[{x:.15,y:.1},{x:.85,y:.2},{x:.1,y:.6},{x:.9,y:.75},{x:.5,y:.05},{x:.55,y:.88}];

let fr=0;
function draw(){
  cx.clearRect(0,0,cv.width,cv.height);
  // Subtle green glow top
  const g=cx.createRadialGradient(cv.width*.5,0,0,cv.width*.5,0,cv.height*.4);
  g.addColorStop(0,'rgba(30,60,40,0.15)');g.addColorStop(1,'transparent');
  cx.fillStyle=g;cx.fillRect(0,0,cv.width,cv.height*.4);

  // Stars
  for(const s of ST){
    s.a+=s.sp;
    const tw=(Math.sin(s.a)+1)/2;
    cx.beginPath();
    cx.arc(s.x*cv.width,s.y*cv.height,s.r,0,Math.PI*2);
    cx.fillStyle=s.gold?`rgba(201,168,76,${.2+tw*.5})`:`rgba(180,200,180,${.1+tw*.35})`;
    cx.fill();
  }

  // Cross sparkles
  for(const s of CROSS_ST){
    const pulse=(Math.sin(fr*.025+s.x*10)+1)/2;
    const x=s.x*cv.width,y=s.y*cv.height,sz=4+pulse*3;
    const al=.3+pulse*.5;
    cx.strokeStyle=`rgba(201,168,76,${al})`;cx.lineWidth=.8;
    cx.beginPath();cx.moveTo(x-sz,y);cx.lineTo(x+sz,y);cx.stroke();
    cx.beginPath();cx.moveTo(x,y-sz);cx.lineTo(x,y+sz);cx.stroke();
    cx.beginPath();cx.moveTo(x-sz*.6,y-sz*.6);cx.lineTo(x+sz*.6,y+sz*.6);cx.stroke();
    cx.beginPath();cx.moveTo(x+sz*.6,y-sz*.6);cx.lineTo(x-sz*.6,y+sz*.6);cx.stroke();
  }

  // Diamond crystal top center
  const dx=cv.width*.5,dy=55,ds=10+Math.sin(fr*.02)*2;
  cx.beginPath();
  cx.moveTo(dx,dy-ds);cx.lineTo(dx+ds*.6,dy);cx.lineTo(dx,dy+ds);cx.lineTo(dx-ds*.6,dy);
  cx.closePath();
  cx.fillStyle=`rgba(62,200,154,${.25+Math.sin(fr*.02)*.15})`;cx.fill();
  cx.strokeStyle='rgba(62,200,154,0.4)';cx.lineWidth=1;cx.stroke();

  fr++;requestAnimationFrame(draw);
}
draw();

function goTo(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

const daySel=document.getElementById('in-day');
const monthSel=document.getElementById('in-month');
const yearSel=document.getElementById('in-year');
for(let d=1;d<=31;d++)daySel.innerHTML+=`<option>${d}</option>`;
['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'].forEach((m,i)=>monthSel.innerHTML+=`<option value="${i+1}">${m}</option>`);
const yr=new Date().getFullYear();
for(let y=yr;y>=yr-90;y--)yearSel.innerHTML+=`<option>${y}</option>`;

const QUESTIONS=[
  {title:"Когда вы принимаете важное решение, вы чаще всего:",options:["Доверяете интуиции и внутреннему ощущению","Анализируете факты и взвешиваете все «за» и «против»","Советуетесь с близкими и ориентируетесь на их мнение"],scores:[1,2,3]},
  {title:"Что лучше всего описывает вашу энергию?",options:["Я генерирую идеи и вдохновляю других","Я довожу дела до конца и люблю порядок","Я создаю гармонию и забочусь о людях вокруг"],scores:[4,2,3]},
  {title:"В отношениях вы:",options:["Ищете глубокую духовную связь","Цените стабильность и надёжность","Хотите свободы и пространства для роста"],scores:[1,2,4]},
  {title:"Что вас восстанавливает после сложного дня?",options:["Тишина и одиночество","Общение с близкими","Творчество или движение"],scores:[1,3,4]},
  {title:"Ваша главная сила — это:",options:["Чувствовать людей и ситуации","Видеть суть и находить решения","Создавать красоту и смыслы"],scores:[1,2,4]},
];

let cQ=0,ans=[],quizData=null;
function startQuiz(){if(!document.getElementById('in-name').value.trim()){document.getElementById('in-name').focus();return;}cQ=0;ans=[];goTo('screen-quiz');renderQ();}
function renderQ(){
  const q=QUESTIONS[cQ];
  document.getElementById('q-title').textContent=q.title;
  const pw=document.getElementById('progress');pw.innerHTML='';
  QUESTIONS.forEach((_,i)=>{const d=document.createElement('div');d.className='dot'+(i<cQ?' done':'');pw.appendChild(d);});
  const ow=document.getElementById('q-options');ow.innerHTML='';
  q.options.forEach((opt,i)=>{const b=document.createElement('button');b.className='option';b.textContent=opt;b.onclick=()=>selAns(i);ow.appendChild(b);});
}
function selAns(i){ans.push(QUESTIONS[cQ].scores[i]);cQ++;if(cQ<QUESTIONS.length)renderQ();else showRes();}
function computeType(){const t={1:0,2:0,3:0,4:0};ans.forEach(id=>t[id]++);let best=1,bs=-1;[1,2,3,4].forEach(id=>{if(t[id]>bs){bs=t[id];best=id;}});return best;}
function showRes(){
  if(!quizData){goTo('screen-error');return;}
  const tid=computeType();
  const type=quizData.types.find(t=>t.id===tid)||quizData.types[0];
  document.getElementById('res-emoji').textContent=type.emoji;
  document.getElementById('res-name').textContent=type.name;
  document.getElementById('res-desc').textContent=type.description;
  goTo('screen-result');
  const payload={name:document.getElementById('in-name').value.trim(),birthDate:`${daySel.value}.${monthSel.value}.${yearSel.value}`,telegramId:tgUser?tgUser.id:null,telegramUsername:tgUser?tgUser.username:null,resultTypeId:tid};
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify(payload));}catch(e){}}
}
function restart(){goTo('screen-welcome');}
document.getElementById('btn-book').addEventListener('click',()=>{const url='https://t.me/EvgeniyaDubrovina';if(tg&&tg.openLink){tg.openLink(url);}else{window.open(url,'_blank');}});
fetch('data.json?v='+Date.now()).then(r=>{if(!r.ok)throw 0;return r.json();}).then(d=>{quizData=d;}).catch(()=>{quizData=null;});
</script>
</body>
</html>
